# teleop node configuration

# ROS 2 node name prefix of the motor node these motors belong to
motor_node_prefix = "/base_and_neck"

# Active reporting rate for all motors (Hz)
active_report_hz = 30.0

# Maximum wheel velocity (m/s) — scaled by axes[3]
max_linear_vel = 1.3   # m/s

# Starting speed mode: "low_speed" (0.5 * max_linear_vel) or "high_speed" (max_linear_vel)
speed_mode = "low_speed"

# Motors are disabled if no Joy message is received within this many seconds
joy_timeout = 0.5   # s

# Maximum steering angle (rad) — scaled by axes[0] * -1
max_steering_angle = 1.57   # rad — scaled by axes[0]

# Fixed steer angles (rad) used when steering axis has motion (in-place rotate geometry)
# Sign is derived from axis direction; set magnitudes here
in_place_rotate_front_left_steer_angle  = -0.7853   # ~45°
in_place_rotate_front_right_steer_angle = 0.7853   # ~45°
in_place_rotate_rear_steer_angle        = 1.57   # ~45°

# Wheel radius used to convert linear velocity (m/s) → motor velocity (rad/s)
wheel_radius = 0.06   # m

# Topic published by the joystick node (sensor_msgs/Joy)
joy_topic = "/joy"

# Joystick axis indices (fixed per joystick message layout)
[joy_axes]
wheel_velocity  = 3   # axes[3] * max_linear_vel
steering_angle  = 0   # axes[0] * max_steering_angle

# Joystick button indices
[joy_buttons]
enable_joystick  = 4    # LB  — enable command forwarding
disable_joystick = 6    # LT  — disable command forwarding
enable_steer     = 1    # B   — enable steer motors
disable_steer    = 2    # X   — disable steer motors
enable_wheel     = 3    # Y   — enable wheel motors
disable_wheel    = 0    # A   — disable wheel motors
low_speed               = 9    # cap velocity to 0.5 * max_linear_vel
high_speed              = 10   # velocity at max_linear_vel
enable_in_place_rotate  = 11   # steer motors snap to in-place rotate angles
disable_in_place_rotate = 12   # return to normal proportional steering

# Default PP motion parameters for steer motors
[pp_defaults]
speed        = 10.0    # rad/s
acceleration = 10.0   # rad/s²
deceleration = 10.0   # rad/s²
torque_limit = 0.0    # N·m  (0 = motor default)

# Default velocity parameters for wheel motors
[velocity_defaults]
current_limit = 0.0    # A      (0 = motor default)
acceleration  = 20.0   # rad/s²

[motors]
front_left_steer  = "BwL"
front_right_steer = "BwR"
rear_steer        = "BwC"
front_left_wheel  = "BpL"
front_right_wheel = "BpR"
rear_wheel        = "BpC"
