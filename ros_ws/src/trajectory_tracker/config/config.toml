# trajectory_tracker — left arm records, right arm replays

node_name = "trajectory_tracker"

package_path = "/home/neuralpilot/anuj/ros_ws/src/trajectory_tracker"

left_arm_node_prefix  = "/left_arm"
right_arm_node_prefix = "/right_arm"

active_report_hz      = 30.0
trajectory_record_hz  = 30.0
replay_hz             = 30.0

replay_motor_mode = "pp"

# Physical left arm motors (these are the recording/leader motors in this config)
left_arm_motors = ["SpL", "SrL", "SwL", "EpL", "WwL", "WpL", "WrL"]

# Physical right arm motors (these are the replay/follower motors in this config)
right_arm_motors = ["SpR", "SrR", "SwR", "EpR", "WwR", "WpR", "WrR"]

# recording motor → replay motor (left records → right replays)
[motor_map]
SpL = "SpR"
SrL = "SrR"
SwL = "SwR"
EpL = "EpR"
WwL = "WwR"
WpL = "WpR"
WrL = "WrR"

# Keys are base motor names (no L/R suffix) — direction-independent
[transform_map]
Sp = "negate"
Sr = "negate"
Sw = "negate"
Ep = "negate"
Ww = "negate"
Wp = "negate"
Wr = "passthrough"

[inverse_transform_map]
Sp = "negate"
Sr = "negate"
Sw = "negate"
Ep = "negate"
Ww = "negate"
Wp = "negate"
Wr = "passthrough"

[pp_defaults]
speed        = 15.0
acceleration = 10.0
deceleration = 10.0
torque_limit = 25.0

[csp_defaults]
speed_limit   = 15.0
current_limit = 0.0
